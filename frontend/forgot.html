<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password</title>
    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="stylesheet" href="just.css">
    <script src="auth.js"></script>
    <script src="forgot.js" defer></script>
</head>
<body>
    <main class="center">
        <section class="auth_box">
            <h2 class="auth_title">Account Recovery</h2>
            <p class="auth_subtitle">please enter your email</p>
            <form class="generic_form" id="forgot_submit">
                <label class="auth_label" for="email"> Email </label>
                <input type="email" name="email" id="email" class="auth_field" placeholder="example@gmail.com" required>


                <button type="submit" id="auth_button">submit</button>
            </form>

               <div class="divider">
                <span>OR</span>
               </div>

            <p class="auth_footer">Already have an account ? <a href="index.html">Login?</a></p>

        </section>
    </main>
    
</body>
</html>
