<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamro Cloud - Profile</title>
    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="stylesheet" href="just.css">
    
    
</head>
<body>

    <header>
        <div class="header_left">
            <button id="hamburger" class="floting_item">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </button>
            <img src="images/logo.png" alt="" class="head_logo">
            <button id="theme_toggle" class="btn">🌙</button>
        </div>
        

        <h1>HAMRO CLOUD</h1>

        <div class="header_right">
            <!--  removed form wrapper,  caused page reload on Enter key -->
            <input type="search" id="search" name="query" placeholder="Search files...">
            <div id="search_results" class="search_dropdown" style="display:none;"></div>
            <a href="profile.html"><img src="images/profilepic.png" alt="" id="avatar" class="floting_item"></a>
        </div>
    </header>

    <nav id="sidebar">
        <ul>
            <li class="floting_item"><a href="dashboard.html">Dashboard</a></li>
            <li class="floting_item"><a href="files.html">My Files</a></li>
            <li class="floting_item"><a href="bonds.html">Groups</a></li>
            <li class="floting_item"><a href="shared.html">Shared</a></li>
            <li class="floting_item"><a href="profile.html">Settings</a></li>
        </ul>
    </nav>

    <main class="dash_main">

        <!-- profile -->
        <section class="dash_card profile_card">
            <img src="images/profilepic.png" alt="Profile Picture" id="profile_pic_lg" class="floting_item">
            <div class="file_meta">
                <h2 id="profile_name">Loading...</h2>
                <small id="profile_email"></small>
                <small id="profile_since"></small>
            </div>
            <button class="btn floting_item" id="change_pic_btn">Change Photo</button>
            <input type="file" id="pic_input" accept="image/*" style="display:none;">
        </section>

        <!-- storage bar -->
        <section class="dash_card">
            <p class="dash_label">Storage — <strong class="storage_numbers">Loading...</strong></p>
            <div class="storage_bar">
                <div class="storage_fill" style="width:0%"></div>
            </div>
        </section>

        <!-- account info -->
        <section class="dash_section">
            <h2>Account Info</h2>
            <div class="dash_card">
                <form id="update_profile">
                    <label class="auth_label" for="full_name">Full Name</label>
                    <input type="text" id="full_name" class="auth_field" placeholder="Your name" required>

                    

                    <p id="update_msg" style="font-size:0.85rem; margin-top:0.5rem;"></p>
                    <button type="submit" class="floting_item" id="auth_button" style="margin-top: 0.75rem;">Change Name</button>
                </form>
            </div>
        </section>

        <!-- changing password -->
<section class="dash_section">
    <h2>Change Password <button type="button" id="toggle_password_btn" class="btn" style="margin-left:1rem;">Change</button></h2>
    <div id="password_form_wrap" >
        <div class="dash_card">
            <form id="change_password">
                <label class="auth_label" for="current_pass">Current Password</label>
                <input type="password" id="current_pass" class="auth_field" required>

                <label class="auth_label" for="new_pass" style="margin-top: 0.75rem;">New Password</label>
                <input type="password" id="new_pass" class="auth_field" required>

                <label class="auth_label" for="confirm_pass" style="margin-top: 0.75rem;">Confirm New Password</label>
                <input type="password" id="confirm_pass" class="auth_field" required>

                <p id="password_msg" style="font-size:0.85rem; margin-top:0.5rem;"></p>
                <button type="submit" class="floting_item" id="auth_button" style="margin-top: 0.75rem;">Update Password</button>
            </form>
        </div>
    </div>
</section>
            
            <div class="dash_card danger_zone">
                <div class="file_meta">
                    <strong>Log Out</strong>
                    <small>Sign out of your account on this device</small>
                </div>
                <button class="btn btn_danger floting_item" id="logout_button">Log Out</button>
            </div>
            
        </section>
        <!--danger zone-->
        <section class="dash_section">
            <h2>Danger Zone</h2>
            
            <div class="dash_card danger_zone" id="delete_account_btn_cover">
                <div class="file_meta">
                    <strong>Delete Account</strong>
                    <small>Permanently delete your account and all your files. This cannot be undone.</small>
                </div>
                <button class="btn btn_danger floting_item" id="delete_account_btn">Delete Account</button>
            </div>
        </section>

    </main>

    <footer></footer>
    <script src="utils.js"></script>
    <script src="auth.js"></script>
        
    <script src="profile.js"></script>
</body>
</html>
