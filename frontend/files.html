<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamro Cloud - My Files</title>
    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="stylesheet" href="just.css">

</head>
<body>

    <header>
        <div class="header_left">
            <button id="hamburger" class="floting_item">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </button>
            <img src="images/logo.png" alt="" class="head_logo">
            <button id="theme_toggle" class="btn">🌙</button>
        </div>
        

        <h1>HAMRO CLOUD</h1>

        <div class="header_right">
            <input type="search" id="search" name="query" placeholder="Search files...">
            <div id="search_results" class="search_dropdown" style="display:none;"></div>
            <a href="profile.html"><img src="images/profilepic.png" alt="" id="avatar" class="floting_item"></a>
        </div>
    </header>

    <nav id="sidebar">
        <ul>
            <li class="floting_item"><a href="dashboard.html">Dashboard</a></li>
            <li class="floting_item"><a href="files.html">My Files</a></li>
            <li class="floting_item"><a href="bonds.html">Groups</a></li>
            <li class="floting_item"><a href="shared.html">Shared</a></li>
            <li class="floting_item"><a href="profile.html">Settings</a></li>
        </ul>
    </nav>

    <main class="dash_main">

        <!-- top bar -->
        <div class="dash_section_head">
            <h2>My Files</h2>
            <button id="upload_btn" class="btn floting_item">⬆ Upload File</button>
        </div>

        <!-- file input -->
        <input type="file" id="file_input" accept="*/*" style="display:none;">

        <!-- upload area -->
        <section class="dash_card" id="upload_area" style="display:none;">
            <div id="drop_zone" class="drop_zone">
                <p>Drag & drop file here</p>
                <p><small>or</small></p>
                <button class="btn floting_item" id="browse_btn">Browse</button>
            </div>
        </section>

        <!-- storage bar -->
        <section class="dash_card">
            <p class="dash_label">Storage — <strong class="storage_numbers">Loading…</strong></p>
            <div class="storage_bar">
                <div class="storage_fill" style="width:0%"></div>
            </div>
        </section>

        <!-- filter -->
        <div class="filter_bar">
            <button class="filter_btn active" data-filter="all">All</button>
            <button class="filter_btn" data-filter="pdf">PDF</button>
            <button class="filter_btn" data-filter="image">Images</button>
            <button class="filter_btn" data-filter="doc">Docs</button>
            <button class="filter_btn" data-filter="other">Other</button>
        </div>

        <!-- file list -->
        <section class="dash_section" id="file_list"></section>

    </main>

    <!-- share modal -->
    <div id="share_modal" class="share_modal">
        <div class="dash_card share_modal_box">

            <div class="share_modal_head">
                <h2 id="modal_title">Share File</h2>
                <button id="modal_close" class="btn">✕</button>
            </div>

            <!-- step 1 -->
            <div id="share_step_1">
                <p class="share_modal_subtitle">Share with:</p>
                <div class="share_type_btns">
                    <button class="btn floting_item" id="share_to_person">👤 Person</button>
                    <button class="btn floting_item" id="share_to_group">👥 Group</button>
                </div>
            </div>

            <!-- step 2a: person -->
            <div id="share_step_person" class="hidden">
                <label class="auth_label" for="share_email">Email address</label>
                <input type="email" id="share_email" class="auth_field share_email_input" placeholder="friend@email.com">
                <button class="btn floting_item share_send_btn" id="share_send_person">Send</button>
            </div>

            <!-- step 2b: group -->
            <div id="share_step_group" class="hidden">
                <p class="share_modal_subtitle">Choose a group:</p>
                <div id="share_group_list" class="share_group_list">
                    <p>Loading groups...</p>
                </div>
            </div>

        </div>
    </div>

    <footer></footer>
    <script src="auth.js"></script>
        <script src="utils.js"></script>
    <script src="files.js"></script>
</body>
</html>
