<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamro Cloud - My Files</title>
    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="stylesheet" href="just.css">
    <script src="utils.js" defer></script>
    <script src="files.js" defer></script>
</head>
<body>

    <header>
        <div class="header_left">
            <button id="hamburger" class="floting_item">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </button>
            <img src="images/logo.png" alt="" class="head_logo">
        </div>

        <h1>HAMRO CLOUD</h1>

        <div class="header_right">
            <!--  removed form wrapper,  caused page reload on Enter key -->
            <input type="search" id="search" name="query" placeholder="Search files...">
            <div id="search_results" class="search_dropdown" style="display:none;"></div>
            <a href="profile.html"><img src="images/profilepic.png" alt="" id="avatar" class="floting_item"></a>
        </div>
    </header>

    <nav id="sidebar">
        <ul>
            <li class="floting_item"><a href="dashboard.html">Dashboard</a></li>
            <li class="floting_item"><a href="files.html">My Files</a></li>
            <li class="floting_item"><a href="bonds.html">Groups</a></li>
            <li class="floting_item"><a href="shared.html">Shared</a></li>
            <li class="floting_item"><a href="profile.html">Settings</a></li>
        </ul>
    </nav>

    <main class="dash_main">

        <!-- top bar -->
        <div class="dash_section_head">
            <h2>My Files</h2>
            <button id="upload_btn" class="btn floting_item" onclick="uploadFile()">⬆ Upload File</button>
        </div>

        <!-- file input -->
        <input type="file" id="file_input" style="display:none;">

        <!-- popup -->
        <div id="toast" style="display:none;"></div>

        <!-- uplode are -->
        <section class="dash_card" id="upload_area" style="display:none;">
            <div id="drop_zone" class="drop_zone">
                <p>Drag & drop file here</p>
                <p><small>or</small></p>
                <button class="btn floting_item" id="browse_btn">Browse</button>
            </div>
        </section>

        <!-- storage bar -->
        <section class="dash_card">
            <p class="dash_label">Storage — <span id="storage_label">Loading…</span></p>
            <div class="storage_bar">
                <div class="storage_fill" id="storage_fill" style="width:0%"></div>
            </div>
        </section>

        <!-- filtering -->
        <div class="filter_bar">
            <button class="filter_btn active" data-filter="all">All</button>
            <button class="filter_btn" data-filter="pdf">PDF</button>
            <button class="filter_btn" data-filter="image">Images</button>
            <button class="filter_btn" data-filter="doc">Docs</button>
            <button class="filter_btn" data-filter="other">Other</button>
        </div>

        <!-- file list -->
        <section class="dash_section" id="file_list">
            <!-- files are brought by js -->
        </section>

    </main>

    <footer></footer>
</body>
</html>
