<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamro Cloud - Group</title>
    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="stylesheet" href="just.css">
 
</head>
<body>

    <header>
        <div class="header_left">
            <button id="hamburger" class="floting_item">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </button>
            <img src="images/logo.png" alt="" class="head_logo">
        </div>

        <h1>HAMRO CLOUD</h1>

        <div class="header_right">
            <input type="search" id="search" name="query" placeholder="Search files...">
            <div id="search_results" class="search_dropdown" style="display:none;"></div>
            <a href="profile.html"><img src="images/profilepic.png" alt="" id="avatar" class="floting_item"></a>
        </div>
    </header>

    <nav id="sidebar">
        <ul>
            <li class="floting_item"><a href="dashboard.html">Dashboard</a></li>
            <li class="floting_item"><a href="files.html">My Files</a></li>
            <li class="floting_item"><a href="bonds.html">Groups</a></li>
            <li class="floting_item"><a href="shared.html">Shared</a></li>
            <li class="floting_item"><a href="profile.html">Settings</a></li>
        </ul>
    </nav>

    <main class="dash_main">

    <!-- group header -->
    <section class="dash_card group_header" id="group_header">
        <div class="group_avatar group_avatar_lg" id="group_initials"></div>
        <div class="file_meta">
            <h2 id="group_name">Loading...</h2>
            <small id="group_meta"></small>
        </div>
        <div class="file_btns">
            <button class="btn floting_item" id="invite_btn">+ Invite</button>
            <button class="btn btn_danger floting_item" id="leave_btn">Leave Group</button>
        </div>
    </section>

    <!-- invite form -->
    <section class="dash_card" id="invite_form" style="display:none;">
        <h2 style="margin-bottom: 1rem;">Invite Member</h2>
        <form id="invite_submit">
            <label class="auth_label" for="invite_email">Email</label>
            <input type="email" id="invite_email" class="auth_field" placeholder="member@email.com" required>
            <button type="submit" id="auth_button" style="margin-top: 0.75rem;">Send Invite</button>
        </form>
    </section>

    <!-- members -->
    <section class="dash_section">
        <h2>Members</h2>
        <div id="members_list">
            <p>Loading...</p>
        </div>
    </section>

    <!-- group files -->
    <section class="dash_section">
        <div class="dash_section_head">
            <h2>Group Files</h2>
            <button class="btn floting_item" id="upload_group_btn">⬆ Upload</button>
        </div>
        <input type="file" id="group_file_input" style="display:none;">
        <div id="group_files_list">
            <p>Loading...</p>
        </div>
    </section>

</main>

    <footer></footer>
        <script src="utils.js"></script>
    <script src="auth.js"></script>
    <script src="group.js"></script>
</body>
</html>
