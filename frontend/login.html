<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamro Claude</title>
    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <main class="center">
        <section class="auth_box">
            <h2 class="auth_title">Welcome</h2>
            <p class="auth_subtitle">login with email</p>
            <form>
                <label class="auth_label" for="email"> Email </label>
                <input type="email" name="email" id="email" class="auth_field" placeholder="example@gmail.com" required>
                <label for="password" class="auth_label">password</label>
                <input type="password" name="password" id="password" class="auth_field" required>
                <p><a href="forgot.html" id="forgot_link">forgot your password ?</a></p>

                <button type="submit" id="auth_button">login</button>
            </form>

               <div class="divider">
                <span>OR</span>
               </div>

            <p class="auth_footer">first time ? <a href="register.html">Register</a></p>

        </section>
    </main>

</body>
</html>
