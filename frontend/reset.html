<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <main class="center">
        <section class="auth_box">
            <h2 class="auth_title">Password Reset</h2>
            <p class="auth_subtitle">Please enter your new password</p>
            <form>
                <label for="password" class="auth_label">password</label>
                <input type="password" name="password" id="password" class="auth_field" required>

                <label for="password_conf" class="auth_label">confirm password</label>
                <input type="password" name="password_conf" id="password_conf" class="auth_field" required>

                <button type="submit" id="auth_button">Change password</button>
            </form>

        </section>
    </main>
</body>
</html>
