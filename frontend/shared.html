<!DOCTYPE html>

<head>

    <title>Hamro Cloud - Shared</title>

</head>
<body>

    <header>
        <div class="header_left">
            <button id="hamburger" class="floting_item">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </button>
            <img src="images/logo.png" alt="" class="head_logo">
            <button id="theme_toggle" class="btn">🌙</button>
        </div>

        <h1>HAMRO CLOUD</h1>

        <div class="header_right">
            <input type="search" id="search" name="query" placeholder="Search shared files...">

            <a href="profile.html"><img src="images/profilepic.png" alt="" id="avatar" class="floting_item"></a>

    <nav id="sidebar">
        <ul>
            <li class="floting_item"><a href="dashboard.html">Dashboard</a></li>

    <main class="dash_main">

        <!-- tabs — links tab removed -->
        <div class="tab_bar">
            <button class="tab_btn active" data-tab="shared_with_me">Shared With Me</button>
            <button class="tab_btn" data-tab="shared_by_me">Shared By Me</button>
        </div>

        <!-- shared with me -->
        <section class="dash_section" id="shared_with_me">
            <h2>Shared With Me</h2>
            <div id="shared_with_me_list">
                <p>Loading...</p>
            </div>
        </section>

        <!-- shared by me -->
        <section class="dash_section" id="shared_by_me" style="display:none;">
            <h2>Shared By Me</h2>
            <div id="shared_by_me_list">
                <p>Loading...</p>
            </div>
        </section>

    <footer></footer>

    <script src="utils.js"></script>
