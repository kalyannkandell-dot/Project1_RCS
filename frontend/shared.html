<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamro Cloud - Shared</title>
    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="stylesheet" href="just.css">
    <script src="utils.js" defer></script>
    <script src="shared.js" defer></script>
</head>
<body>

    <header>
        <div class="header_left">
            <button id="hamburger" class="floting_item">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </button>
            <img src="images/logo.png" alt="" class="head_logo">
        </div>

        <h1>HAMRO CLOUD</h1>

        <div class="header_right">
            <input type="search" id="search" name="query" placeholder="Search shared files...">
            <div id="search_results" class="search_dropdown" style="display:none;"></div>
            <a href="profile.html"><img src="images/profilepic.png" alt="" id="avatar" class="floting_item"></a>
        </div>
    </header>

    <nav id="sidebar">
        <ul>
            <li class="floting_item"><a href="dashboard.html">Dashboard</a></li>
            <li class="floting_item"><a href="files.html">My Files</a></li>
            <li class="floting_item"><a href="bonds.html">Groups</a></li>
            <li class="floting_item"><a href="shared.html">Shared</a></li>
            <li class="floting_item"><a href="profile.html">Settings</a></li>
        </ul>
    </nav>

    <main class="dash_main">

        <!-- tabs -->
        <div class="tab_bar">
            <button class="tab_btn active" data-tab="shared_with_me">Shared With Me</button>
            <button class="tab_btn" data-tab="shared_by_me">Shared By Me</button>
            <button class="tab_btn" data-tab="links">My Links</button>
        </div>

        <!-- shared with me -->
        <section class="dash_section" id="shared_with_me">
            <h2>Shared With Me</h2>
            <div id="shared_with_me_list">
                <p>Loading...</p>
            </div>
        </section>

        <!-- shared by me -->
        <section class="dash_section" id="shared_by_me" style="display:none;">
            <h2>Shared By Me</h2>
            <div id="shared_by_me_list">
                <p>Loading...</p>
            </div>
        </section>

        <!-- my links -->
        <section class="dash_section" id="links" style="display:none;">
            <div class="dash_section_head">
                <h2>My Shared Links</h2>
                <button class="btn floting_item" id="new_link_btn">+ New Link</button>
            </div>

            <!-- new link form -->
            <div class="dash_card" id="new_link_form" style="display:none;">
                <h2 style="margin-bottom: 1rem;">Create Share Link</h2>
                <form id="link_form">
                    <label class="auth_label" for="link_file">File Name</label>
                    <input type="text" id="link_file" class="auth_field" placeholder="e.g. project_report.pdf" required>

                    <label class="auth_label" for="link_expiry" style="margin-top: 0.75rem;">Expiry Date</label>
                    <input type="date" id="link_expiry" class="auth_field">

                    <label class="auth_label" for="link_pass" style="margin-top: 0.75rem;">Password (optional)</label>
                    <input type="password" id="link_pass" class="auth_field" placeholder="Leave empty for no password">

                    <button type="submit" id="auth_button" style="margin-top: 0.75rem;">Generate Link</button>
                </form>
            </div>

            <div id="links_list">
                <p>Loading...</p>
            </div>
        </section>

    </main>

    <footer></footer>
</body>
</html>
