<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="stylesheet" href="just.css">
  
</head>


<body>
    <main class="center">
        <section class="auth_box">
            <h2 class="auth_title">Welcome to Hamro cloud</h2>
            <p class="auth_subtitle">Register with email</p>
            <form class="generic_form" id="register_form">
                <label class="auth_label" for="email"> Email </label>
                <input type="email" name="email" id="email" class="auth_field" placeholder="example@gmail.com" required>
                <label for="password" class="auth_label">password</label>
                <input type="password" name="password" id="password" class="auth_field" required>

                <label for="password_conf" class="auth_label">confirm password</label>
                <input type="password" name="password_conf" id="password_conf" class="auth_field" required>

                <button type="submit" id="auth_button">Submit</button>
            </form>

               <div class="divider">
                <span>OR</span>
               </div>

            <p class="auth_footer">Already have an account ? <a href="login.html">Login</a></p>

        </section>
    </main>
    <script src="auth.js"></script>
        <script src="utils.js"></script>
    <script src="register.js"></script>
</body>
</html>
