<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamro Cloud - Groups</title>
    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="stylesheet" href="just.css">
    
</head>
<body>

    <header>
        <div class="header_left">
            <button id="hamburger" class="floting_item">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </button>
            <img src="images/logo.png" alt="" class="head_logo">
            <button id="theme_toggle" class="btn">🌙</button>
        </div>

        <h1>HAMRO CLOUD</h1>

        <div class="header_right">
            <!--  removed form wrapper,  caused page reload on Enter key -->
            <input type="search" id="search" name="query" placeholder="Search files...">
            <div id="search_results" class="search_dropdown" style="display:none;"></div>
            <a href="profile.html"><img src="images/profilepic.png" alt="" id="avatar" class="floting_item"></a>
        </div>
    </header>

    <nav id="sidebar">
        <ul>
            <li class="floting_item"><a href="dashboard.html">Dashboard</a></li>
            <li class="floting_item"><a href="files.html">My Files</a></li>
            <li class="floting_item"><a href="bonds.html">Groups</a></li>
            <li class="floting_item"><a href="shared.html">Shared</a></li>
            <li class="floting_item"><a href="profile.html">Settings</a></li>
        </ul>
    </nav>

    <main class="dash_main">

        <!-- page header -->
        <div class="dash_section_head">
            <h2>My Groups</h2>
            <button id="create_group_btn" class="btn floting_item">+ New Group</button>
        </div>

        <!-- crate group form -->
        <section class="dash_card" id="create_group_form" style="display:none;">
            <h2 style="margin-bottom: 1rem;">Create New Group</h2>
            <form id="new_group">
                <label class="auth_label" for="group_name">Group Name</label>
                <input type="text" id="group_name" class="auth_field" placeholder="e.g. CS Project Team" required>

                <label class="auth_label" for="group_desc" style="margin-top: 0.75rem;">Description</label>
                <input type="text" id="group_desc" class="auth_field" placeholder="What is this group for?">

                <label class="auth_label" for="invite_email" style="margin-top: 0.75rem;">Invite Member (email)</label>
                <input type="email" id="invite_email" class="auth_field" placeholder="member@email.com">

                <p id="create_group_msg" style="font-size:0.85rem; margin-top:0.5rem;"></p>
                <button type="submit" id="auth_button" style="margin-top: 0.75rem;">Create Group</button>
            </form>
        </section>

        <!-- groups list -->
        <section class="dash_section">
            <h2>Groups You're In</h2>
            <div id="groups_list">
                <p>Loading...</p>
            </div>
        </section>

        <!-- pending invites -->
        <section class="dash_section">
            <h2>Pending Invites</h2>
            <div id="invites_list">
                <p>Loading...</p>
            </div>
        </section>

    </main>

    <footer></footer>
    <script src="auth.js"></script>
        <script src="utils.js"></script>
    <script src="bonds.js"></script>
</body>
</html>
