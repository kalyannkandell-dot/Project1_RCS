<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamro Cloud - Dashboard</title>
    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="stylesheet" href="just.css">
    
    <script src="utils.js" defer></script>
    <script src="dashboard.js" defer></script>
    
</head>
<body>

    <header>
        <div class="header_left">
            <button id="hamburger" class="floting_item">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </button>
            <img src="images/logo.png" alt="" class="head_logo">
        </div>

        <h1>HAMRO CLOUD</h1>

        <div class="header_right">
            <!--  removed form wrapper,  caused page reload on Enter key -->
            <input type="search" id="search" name="query" placeholder="Search files...">
            <div id="search_results" class="search_dropdown" style="display:none;"></div>
            <a href="profile.html"><img src="images/profilepic.png" alt="" id="avatar" class="floting_item"></a>
        </div>
    </header>

    <nav id="sidebar">
        <ul>
            <li class="floting_item"><a href="dashboard.html">Dashboard</a></li>
            <li class="floting_item"><a href="files.html">My Files</a></li>
            <li class="floting_item"><a href="bonds.html">Groups</a></li>
            <li class="floting_item"><a href="shared.html">Shared</a></li>
            <li class="floting_item"><a href="profile.html">Settings</a></li>
        </ul>
    </nav>

    <main class="dash_main">

        <!-- STORAGE -->
        <section class="dash_card">
            <p class="dash_label">Storage — <strong class="storage_numbers">Loading...</strong></p>
            <div class="storage_bar">
                <div class="storage_fill" style="width:0%"></div>
            </div>
        </section>

        <!-- STATS -->
        <section class="dash_grid">
            <div class="dash_card dash_stat floting_item">
                <span class="dash_label">Total Files</span>
                <strong class="dash_num" id="stat_files">--</strong>
            </div>
            <div class="dash_card dash_stat floting_item">
                <span class="dash_label">Shared With Me</span>
                <strong class="dash_num" id="stat_shared">--</strong>
            </div>
            <div class="dash_card dash_stat floting_item">
                <span class="dash_label">My Groups</span>
                <strong class="dash_num" id="stat_groups">--</strong>
            </div>
            <div class="dash_card dash_stat floting_item">
                <span class="dash_label">Active Links</span>
                <strong class="dash_num" id="stat_links">--</strong>
            </div>
        </section>

        <!-- QUICK ACTIONS -->
        <section class="dash_section">
            <div class="dash_section_head">
                <h2>Quick Actions</h2>
            </div>
            <div class="dash_grid">
                <a href="files.html" class="dash_card dash_action floting_item">⬆ Upload File</a>
                <a href="files.html" class="dash_card dash_action floting_item">📁 My Files</a>
                <a href="bonds.html" class="dash_card dash_action floting_item">👥 My Groups</a>
                <a href="shared.html" class="dash_card dash_action floting_item">🔗 Shared</a>
            </div>
        </section>

        <!-- RECENT FILES -->
        <section class="dash_section">
            <div class="dash_section_head">
                <h2>Recent Files</h2>
                <a href="files.html">View All →</a>
            </div>
            <div id="recent_files_list">
                <p>Loading...</p>
            </div>
        </section>

        <!-- MY GROUPS -->
        <section class="dash_section">
            <div class="dash_section_head">
                <h2>My Groups</h2>
                <a href="bonds.html">View All →</a>
            </div>
            <div id="groups_list" class="dash_grid">
                <p>Loading...</p>
            </div>
        </section>

    </main>

    <footer></footer>
</body>
</html>
